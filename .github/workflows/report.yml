name: SVIN Ops Error Report

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 10 * * *'  # 4:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type: 9am / 12pm / 4pm / 6pm'
        required: false
        default: '9am'

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine report type
        id: report_type
        run: |
          # Use manual input if provided via workflow_dispatch
          if [ -n "${{ github.event.inputs.report_type }}" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOUR=$(date -u +"%H")
          if [ "$HOUR" = "03" ]; then
            echo "type=9am" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "06" ]; then
            echo "type=12pm" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "10" ]; then
            echo "type=4pm" >> $GITHUB_OUTPUT
          else
            echo "type=6pm" >> $GITHUB_OUTPUT
          fi

      - name: Debug token shape
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          echo "Token length: ${#SLACK_BOT_TOKEN}"
          echo "First 8 chars: ${SLACK_BOT_TOKEN:0:8}"
          echo "Last 8 chars: ${SLACK_BOT_TOKEN: -8}"

      - name: Run error report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REPORT_TYPE: ${{ steps.report_type.outputs.type }}
        run: python report.py
